<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightScout</title>

<style>

body{
font-family: Georgia, serif;
margin:40px;
color:#111;
background:white;
}

h1{
font-size:64px;
margin-bottom:8px;
}

h2{
margin-top:40px;
}

button{
padding:12px 24px;
margin:6px;
border-radius:18px;
border:2px solid #ccc;
background:#eee;
color:#1473d7;
cursor:pointer;
font-weight:700;
}

input, textarea{

display:block;
width:min(900px,100%);
padding:14px;
margin:12px 0;
border-radius:14px;
border:2px solid #ccc;
font-size:18px;

}

textarea{
min-height:160px;
}

.card{

border:1px solid #ddd;
border-radius:18px;
padding:16px;
margin:16px 0;
background:#fafafa;
max-width:900px;

}

</style>

</head>


<body>

<div>Nightlife Intelligence</div>

<h1>NightScout</h1>

<p>
Meet in the middle. Discover bars, lounges, taverns, pubs, clubs,
pool halls, bar arcades, axe throwing venues and nightlife across New Jersey.
</p>


<h2>NJ nightlife</h2>


<div>

<button>Solo</button>
<button>Middle</button>
<button>Group</button>
<button>AI</button>

</div>


<!-- SOLO SEARCH -->

<input
id="soloQuery"
placeholder="City, ZIP, or address"
/>

<div>

<button id="searchBtn">
Search
</button>

<button id="loadNJ">
Load NJ Venues
</button>

</div>


<!-- MEET IN THE MIDDLE -->

<h3>Meet in the Middle</h3>

<input
id="locA"
placeholder="Location A"
/>

<input
id="locB"
placeholder="Location B"
/>

<button
id="middleBtn"
>
Meet in the Middle
</button>



<!-- GROUP COORDINATION -->

<h3>Group Coordination</h3>

<textarea
id="groupList"
placeholder="Enter one location per line"
></textarea>

<button
id="groupBtn"
>
Group Center
</button>



<!-- AI NIGHT PLAN -->

<h3>Night Plan</h3>

<input
id="aiPrompt"
placeholder="Example: beach bar with DJ"
/>

<button
id="aiBtn"
>
Generate Night Plan
</button>



<!-- RESULTS -->

<h2>Results</h2>

<div id="results"></div>



<script src="app.js"></script>

</body>

</html>
