<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightScout</title>

<style>

body{
font-family: Georgia, serif;
margin:40px;
background:#ffffff;
color:#111;
}

h1{
font-size:48px;
margin-bottom:10px;
}

button{
padding:8px 14px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
background:#eee;
cursor:pointer;
}

input, textarea{
padding:8px;
margin:6px 4px;
border-radius:8px;
border:1px solid #ccc;
width:260px;
}

textarea{
width:540px;
height:120px;
}

#results{
margin-top:30px;
}

.card{
border:1px solid #ddd;
border-radius:14px;
padding:14px;
margin-bottom:10px;
background:#fafafa;
}

</style>

</head>


<body>

<h3>Nightlife Intelligence</h3>
<h1>NightScout</h1>

<p>
Meet in the middle. Discover bars, lounges, beach bars,
clubs, casinos and live DJ venues across New Jersey.
</p>

<h3>NJ nightlife</h3>

<button>Solo</button>
<button>Middle</button>
<button>Group</button>
<button>AI</button>

<br>

<input id="soloQuery" placeholder="City, ZIP, or address">

<br>

<button id="searchBtn">Search</button>
<button id="loadNJ">Load NJ Venues</button>

<br><br>

<input id="locA" placeholder="Location A">
<input id="locB" placeholder="Location B">

<br>

<button id="middleBtn">Meet in the Middle</button>

<br><br>

<textarea id="groupList" placeholder="Enter one location per line"></textarea>

<br>

<button id="groupBtn">Group Center</button>

<br><br>

<input id="aiPrompt" placeholder="Example: beach bar with DJ">

<br>

<button id="aiBtn">Generate Night Plan</button>

<h2>Results</h2>

<div id="results"></div>

<script src="app.js"></script>

</body>

</html>
